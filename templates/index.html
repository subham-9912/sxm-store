<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBHAM X MOD | Tool Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: #1a1a1a;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #7289da;
            margin-bottom: 10px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn-discord {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #5865F2;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 16px;
            width: 100%;
        }
        .btn-discord:hover {
            background: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(88, 101, 242, 0.4);
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SUBHAM X MOD</h1>
        <p>Premium Free Fire Tools & Automation Kits</p>
        
        <a href="/login" class="btn-discord">
            Login with Discord
        </a>

        <div class="footer">
            © 2026 SUBHAM X MOD STORE. All Rights Reserved.
        </div>
    </div>

</body>
</html>
